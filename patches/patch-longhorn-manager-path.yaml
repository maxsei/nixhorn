apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: longhorn-manager
spec:
  template:
    spec:
      containers:
        - name: longhorn-manager
          env:
            - name: PATH
              value: &nixpath "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/run/wrappers/bin:/nix/var/nix/profiles/default/bin:/run/current-system/sw/bin"
        - name: pre-pull-share-manager-image
          env:
            - name: PATH
              value: *nixpath
