name: Build and Release

on:
  pull_request:
    types:
      - closed
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.labels.*.name, 'release:major') ||
        contains(github.event.pull_request.labels.*.name, 'release:minor') ||
        contains(github.event.pull_request.labels.*.name, 'release:patch')
      )
    outputs:
      bump_type: ${{ steps.check_label.outputs.bump_type }}
      new_version: ${{ steps.bump_version.outputs.new_version }}

    steps:
      - name: Check for release label
        id: check_label
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          echo "Labels: $LABELS"

          BUMP_TYPE="none"
          if echo "$LABELS" | grep -q "release:major"; then
            BUMP_TYPE="major"
          elif echo "$LABELS" | grep -q "release:minor"; then
            BUMP_TYPE="minor"
          elif echo "$LABELS" | grep -q "release:patch"; then
            BUMP_TYPE="patch"
          fi

          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Bump type: $BUMP_TYPE"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: read_version
        run: |
          CURRENT_VERSION=$(cat packages/nixhorn-webhook/VERSION)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Bump version
        id: bump_version
        run: |
          CURRENT_VERSION="${{ steps.read_version.outputs.current_version }}"
          BUMP_TYPE="${{ steps.check_label.outputs.bump_type }}"

          # Parse version (assuming semver format: major.minor.patch)
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"

          # Bump version based on label
          case "$BUMP_TYPE" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          NEW_VERSION="$major.$minor.$patch"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

          # Update VERSION file
          echo "$NEW_VERSION" > packages/nixhorn-webhook/VERSION

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add packages/nixhorn-webhook/VERSION
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new_version }}" || echo "No changes to commit"
          git push origin ${{ github.ref_name }} || echo "Nothing to push"

      - name: Create and push git tag
        run: |
          VERSION="${{ steps.bump_version.outputs.new_version }}"
          git tag -a "v${VERSION}" -m "Release version ${VERSION}"
          git push origin "v${VERSION}"
          echo "Created and pushed tag v${VERSION}"

  build-images:
    needs: prepare-release
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            runner: ubuntu-latest
            platform: amd64
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build ${{ matrix.arch }} image
        run: |
          nix build .#packages.${{ matrix.arch }}.nixhorn-webhook-image --out-link nixhorn-webhook-image-${{ matrix.platform }}
          echo "Built ${{ matrix.arch }} image"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixhorn-webhook-image-${{ matrix.platform }}
          path: nixhorn-webhook-image-${{ matrix.platform }}
          retention-days: 1

  push-release:
    needs: [prepare-release, build-images]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Download amd64 image
        uses: actions/download-artifact@v4
        with:
          name: nixhorn-webhook-image-amd64

      - name: Download arm64 image
        uses: actions/download-artifact@v4
        with:
          name: nixhorn-webhook-image-arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push x86_64 image
        run: |
          VERSION="${{ needs.prepare-release.outputs.new_version }}"
          OWNER="${{ github.repository_owner }}"
          nix shell nixpkgs#skopeo -c skopeo copy docker-archive:./nixhorn-webhook-image-amd64 docker://ghcr.io/${OWNER}/nixhorn-webhook:${VERSION}-amd64
          echo "Pushed ghcr.io/${OWNER}/nixhorn-webhook:${VERSION}-amd64"

      - name: Push aarch64 image
        run: |
          VERSION="${{ needs.prepare-release.outputs.new_version }}"
          OWNER="${{ github.repository_owner }}"
          nix shell nixpkgs#skopeo -c skopeo copy docker-archive:./nixhorn-webhook-image-arm64 docker://ghcr.io/${OWNER}/nixhorn-webhook:${VERSION}-arm64
          echo "Pushed ghcr.io/${OWNER}/nixhorn-webhook:${VERSION}-arm64"

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ needs.prepare-release.outputs.new_version }}"
          OWNER="${{ github.repository_owner }}"

          # Create multi-arch manifest for version tag
          nix shell nixpkgs#docker -c docker manifest create ghcr.io/${OWNER}/nixhorn-webhook:${VERSION} \
            --amend ghcr.io/${OWNER}/nixhorn-webhook:${VERSION}-amd64 \
            --amend ghcr.io/${OWNER}/nixhorn-webhook:${VERSION}-arm64

          nix shell nixpkgs#docker -c docker manifest push ghcr.io/${OWNER}/nixhorn-webhook:${VERSION}

          # Create multi-arch manifest for latest tag
          nix shell nixpkgs#docker -c docker manifest create ghcr.io/${OWNER}/nixhorn-webhook:latest \
            --amend ghcr.io/${OWNER}/nixhorn-webhook:${VERSION}-amd64 \
            --amend ghcr.io/${OWNER}/nixhorn-webhook:${VERSION}-arm64

          nix shell nixpkgs#docker -c docker manifest push ghcr.io/${OWNER}/nixhorn-webhook:latest

          echo "Pushed multi-arch manifests for ${VERSION} and latest"

      - name: Build and push Helm chart
        run: |
          VERSION="${{ needs.prepare-release.outputs.new_version }}"
          OWNER="${{ github.repository_owner }}"

          # Build chart
          nix build .#packages.x86_64-linux.nixhorn-webhook-chart --out-link ./chart

          # Package chart
          nix shell nixpkgs#kubernetes-helm -c helm package ./chart --version ${VERSION} --app-version ${VERSION}

          # Push chart as OCI artifact
          nix shell nixpkgs#kubernetes-helm -c helm push nixhorn-webhook-${VERSION}.tgz oci://ghcr.io/${OWNER}/nixhorn-webhook/charts

          echo "Pushed Helm chart to ghcr.io/${OWNER}/nixhorn-webhook/charts/nixhorn-webhook:${VERSION}"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.prepare-release.outputs.new_version }}
          release_name: Release v${{ needs.prepare-release.outputs.new_version }}
          body: |
            ## Container Images

            Pull the multi-arch image:
            ```
            docker pull ghcr.io/${{ github.repository_owner }}/nixhorn-webhook:${{ needs.prepare-release.outputs.new_version }}
            ```

            Or use latest:
            ```
            docker pull ghcr.io/${{ github.repository_owner }}/nixhorn-webhook:latest
            ```

            Architecture-specific tags:
            - `ghcr.io/${{ github.repository_owner }}/nixhorn-webhook:${{ needs.prepare-release.outputs.new_version }}-amd64`
            - `ghcr.io/${{ github.repository_owner }}/nixhorn-webhook:${{ needs.prepare-release.outputs.new_version }}-arm64`

            ## Helm Chart

            Install via OCI:
            ```
            helm install nixhorn-webhook oci://ghcr.io/${{ github.repository_owner }}/nixhorn-webhook/charts/nixhorn-webhook --version ${{ needs.prepare-release.outputs.new_version }}
            ```

            ## Kustomize

            Apply the full stack (includes Longhorn + webhook):
            ```
            kubectl apply -k https://github.com/${{ github.repository }}//microvm/services/k3s/manifests?ref=v${{ needs.prepare-release.outputs.new_version }}
            ```
          draft: false
          prerelease: false
