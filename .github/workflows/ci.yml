name: CI

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate-release-labels:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check release labels
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'

          # Count release labels
          RELEASE_LABEL_COUNT=0
          if echo "$LABELS" | grep -q "release:major"; then
            RELEASE_LABEL_COUNT=$((RELEASE_LABEL_COUNT + 1))
          fi
          if echo "$LABELS" | grep -q "release:minor"; then
            RELEASE_LABEL_COUNT=$((RELEASE_LABEL_COUNT + 1))
          fi
          if echo "$LABELS" | grep -q "release:patch"; then
            RELEASE_LABEL_COUNT=$((RELEASE_LABEL_COUNT + 1))
          fi

          if [ $RELEASE_LABEL_COUNT -gt 1 ]; then
            echo "ERROR: Multiple release labels found! Only one release label (release:major, release:minor, or release:patch) is allowed."
            exit 1
          fi

  build:
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            runner: ubuntu-latest
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build nixhorn-webhook binary (${{ matrix.arch }})
        run: nix build .#packages.${{ matrix.arch }}.nixhorn-webhook

      - name: Build nixhorn-webhook image (${{ matrix.arch }})
        run: nix build .#packages.${{ matrix.arch }}.nixhorn-webhook-image

      - name: Build nixhorn-webhook chart
        if: matrix.arch == 'x86_64-linux'
        run: nix build .#packages.${{ matrix.arch }}.nixhorn-webhook-chart

  validate-helm:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build chart
        run: nix build .#packages.x86_64-linux.nixhorn-webhook-chart --out-link ./chart

      - name: Lint Helm chart
        run: |
          nix shell nixpkgs#kubernetes-helm -c helm lint ./chart

      - name: Template Helm chart
        run: |
          nix shell nixpkgs#kubernetes-helm -c helm template test-release ./chart > /dev/null

      - name: Validate values.schema.json exists
        run: |
          test -f ./chart/values.schema.json || (echo "values.schema.json missing!" && exit 1)

  validate-kustomize:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Extract Longhorn version
        id: longhorn_version
        run: |
          echo "version=$(grep -oP 'longhorn-\K[0-9]+\.[0-9]+\.[0-9]+' microvm/services/k3s/manifests.nix | head -1)" >> $GITHUB_OUTPUT

      - name: Build chart (needed for kustomize)
        run: nix build .#packages.x86_64-linux.nixhorn-webhook-chart --out-link ./nixhorn-webhook-chart

      - name: Build manifests via kustomize
        run: |
          mkdir -p /tmp/kustomize-test
          cd /tmp/kustomize-test

          # Copy kustomization from repo
          cp ${{ github.workspace }}/microvm/services/k3s/manifests/kustomization.yaml .
          cp -r ${{ github.workspace }}/microvm/services/k3s/manifests/*.yaml .

          # Copy built chart (dereference symlinks with -L)
          cp -rL ${{ github.workspace }}/nixhorn-webhook-chart ./nixhorn-webhook

          # Fetch longhorn chart (version extracted from manifests.nix)
          curl -sL "https://github.com/longhorn/charts/releases/download/longhorn-${{ steps.longhorn_version.outputs.version }}/longhorn-${{ steps.longhorn_version.outputs.version }}.tgz" | tar xz

          # Create kustomization that references local charts
          cat > kustomization.yaml << 'EOF'
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          helmGlobals:
            chartHome: .
          helmCharts:
            - name: nixhorn-webhook
              releaseName: nixhorn-webhook
              namespace: longhorn-system
            - name: longhorn
              releaseName: longhorn
              namespace: longhorn-system
          components:
            - ./manifests
          EOF

          # Copy manifests component
          cp -r ${{ github.workspace }}/microvm/services/k3s/manifests ./manifests

          # Build with kustomize
          nix shell nixpkgs#kustomize -c kustomize build --enable-helm . > /dev/null

          echo "Kustomize build successful!"

  check-version-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check VERSION file matches image tag
        run: |
          VERSION=$(cat packages/nixhorn-webhook/VERSION)
          echo "VERSION file: $VERSION"

          # Build image and check its tag
          nix build .#packages.x86_64-linux.nixhorn-webhook-image --out-link ./image
          IMAGE_TAG=$(nix eval .#packages.x86_64-linux.nixhorn-webhook-image.passthru.version --raw)
          echo "Image tag: $IMAGE_TAG"

          if [ "$VERSION" != "$IMAGE_TAG" ]; then
            echo "ERROR: VERSION file ($VERSION) != image tag ($IMAGE_TAG)"
            exit 1
          fi

          echo "Version consistency check passed!"

      - name: Check chart version matches
        run: |
          VERSION=$(cat packages/nixhorn-webhook/VERSION)

          # Build chart and check its version
          nix build .#packages.x86_64-linux.nixhorn-webhook-chart --out-link ./chart
          CHART_VERSION=$(grep '^version:' ./chart/Chart.yaml | awk '{print $2}')
          APP_VERSION=$(grep '^appVersion:' ./chart/Chart.yaml | awk '{print $2}')

          echo "Chart version: $CHART_VERSION"
          echo "Chart appVersion: $APP_VERSION"

          if [ "$VERSION" != "$CHART_VERSION" ]; then
            echo "ERROR: VERSION file ($VERSION) != chart version ($CHART_VERSION)"
            exit 1
          fi

          if [ "$VERSION" != "$APP_VERSION" ]; then
            echo "ERROR: VERSION file ($VERSION) != chart appVersion ($APP_VERSION)"
            exit 1
          fi

          echo "Chart version consistency check passed!"
