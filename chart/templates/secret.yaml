{{- if .Values.webhook.tls.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "patch-longhorn-manager-adm-ctl.tlsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "patch-longhorn-manager-adm-ctl.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  {{- if and .Values.webhook.tls.cert .Values.webhook.tls.key }}
  {{- /* Use certificates provided in values */}}
  tls.crt: {{ .Values.webhook.tls.cert | b64enc }}
  tls.key: {{ .Values.webhook.tls.key | b64enc }}
  {{- else if .Files.Get "files/default.crt" }}
  {{- /* Use default certificates bundled with the chart */}}
  tls.crt: {{ .Files.Get "files/default.crt" | b64enc }}
  tls.key: {{ .Files.Get "files/default.key" | b64enc }}
  {{- else }}
  {{- /* No certificates available - secret will be empty */}}
  tls.crt: ""
  tls.key: ""
  {{- end }}
{{- end }}
