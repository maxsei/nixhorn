{{- if eq .Values.webhook.tls.type "literal" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nixhorn-webhook.tlsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nixhorn-webhook.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  {{- if and .Values.webhook.tls.cert .Values.webhook.tls.key }}
  {{- /* Use certificates provided in values */}}
  tls.crt: {{ .Values.webhook.tls.cert | b64enc }}
  tls.key: {{ .Values.webhook.tls.key | b64enc }}
  {{- else }}
  tls.crt: ""
  tls.key: ""
  {{- end }}
{{- end }}
