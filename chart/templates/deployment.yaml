apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nixhorn-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nixhorn-webhook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nixhorn-webhook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if eq .Values.webhook.tls.type "insecure" }}
        checksum/tls: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "nixhorn-webhook.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
      - name: webhook
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
        - --port={{ .Values.webhook.port }}
        - --tls-cert-file=/etc/tls/tls.crt
        - --tls-key-file=/etc/tls/tls.key
        - --longhorn-namespace={{ .Values.webhook.longhornNamespace }}
        - --path-patch={{ .Values.webhook.pathPatch }}
        ports:
        - name: https
          containerPort: {{ .Values.webhook.port }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.webhook.port }}
            scheme: HTTPS
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.webhook.port }}
            scheme: HTTPS
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        - name: tls
          mountPath: /etc/tls
          readOnly: true
      volumes:
      - name: tls
        {{- if eq .Values.webhook.tls.type "insecure" }}
        configMap:
          name: {{ include "nixhorn-webhook.tlsConfigMapName" . }}
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
        {{- else }}
        secret:
          secretName: {{ include "nixhorn-webhook.tlsSecretName" . }}
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
        {{- end }}
