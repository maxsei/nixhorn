apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "nixhorn-webhook.fullname" . }}
  labels:
    {{- include "nixhorn-webhook.labels" . | nindent 4 }}
webhooks:
- name: {{ include "nixhorn-webhook.fullname" . }}.{{ .Values.webhook.longhornNamespace }}.svc.cluster.local
  clientConfig:
    service:
      namespace: {{ .Release.Namespace }}
      name: {{ include "nixhorn-webhook.fullname" . }}
      path: /mutate
    {{- if and (eq .Values.webhook.tls.type "literal") .Values.webhook.tls.cert }}
    {{- /* Use certificate provided in values as CA bundle (for self-signed certs) */}}
    caBundle: {{ .Values.webhook.tls.cert | b64enc }}
    {{- else if .Files.Get "files/default.crt" }}
    {{- /* Use default certificate bundled with the chart */}}
    caBundle: {{ .Files.Get "files/default.crt" | b64enc }}
    {{- else }}
    {{- /* No CA certificate available - may need cert-manager or manual configuration */}}
    caBundle: ""
    {{- end }}
  rules:
  - operations: ["CREATE"]
    apiGroups: [""]
    apiVersions: ["v1"]
    resources: ["pods"]
    scope: "Namespaced"
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: {{ .Values.webhook.longhornNamespace }}
  admissionReviewVersions: ["v1"]
  sideEffects: None
  timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
  failurePolicy: {{ .Values.webhook.failurePolicy }}
