apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "patch-longhorn-manager-adm-ctl.fullname" . }}
  labels:
    {{- include "patch-longhorn-manager-adm-ctl.labels" . | nindent 4 }}
webhooks:
- name: {{ include "patch-longhorn-manager-adm-ctl.fullname" . }}.{{ .Values.webhook.longhornNamespace }}.svc.cluster.local
  clientConfig:
    service:
      namespace: {{ .Release.Namespace }}
      name: {{ include "patch-longhorn-manager-adm-ctl.fullname" . }}
      path: /mutate
    {{- if .Values.webhook.tls.caCert }}
    {{- /* Use CA certificate provided in values */}}
    caBundle: {{ .Values.webhook.tls.caCert }}
    {{- else if .Files.Get "files/default.crt" }}
    {{- /* Use default certificate bundled with the chart */}}
    caBundle: {{ .Files.Get "files/default.crt" | b64enc }}
    {{- else }}
    {{- /* No CA certificate available - may need cert-manager or manual configuration */}}
    caBundle: ""
    {{- end }}
  rules:
  - operations: ["CREATE"]
    apiGroups: [""]
    apiVersions: ["v1"]
    resources: ["pods"]
    scope: "Namespaced"
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: {{ .Values.webhook.longhornNamespace }}
  admissionReviewVersions: ["v1"]
  sideEffects: None
  timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
  failurePolicy: {{ .Values.webhook.failurePolicy }}
